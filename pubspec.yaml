name: noetica
description: "Noetica — second brain, growth tracker, memoir."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.3
  sqflite_common_ffi_web: ^0.4.5
  path_provider: ^2.1.4
  path: ^1.9.0
  uuid: ^4.5.1
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  google_fonts: ^6.2.1
  http: ^1.2.2
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1
  google_sign_in: ^6.2.1
  googleapis_auth: ^1.6.0
  flutter_secure_storage: ^9.2.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/branding/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/branding/icon_glyph.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/branding/icon_glyph.png"
  windows:
    generate: true
    image_path: "assets/branding/icon_glyph.png"
    icon_size: 256

flutter_native_splash:
  color: "#000000"
  image: "assets/branding/splash_full.png"
  android: true
  ios: false
  web: false
  android_12:
    color: "#000000"
    image: "assets/branding/icon_glyph.png"
    icon_background_color: "#000000"
